<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You 💕</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #050505; color: white; overflow: hidden; 
            font-family: 'Quicksand', sans-serif; -webkit-touch-callout: none; user-select: none;
        }

        /* --- 3D CANVAS LAYER --- */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; opacity: 0; transition: opacity 2s ease; }

        /* --- UI LAYERS --- */
        #lock-stage {
            position: absolute; inset: 0; z-index: 100; background: #ba1636;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .polaroid { background: white; padding: 15px 15px 85px 15px; border-radius: 6px; text-align: center; width: 240px; transform: rotate(-2deg); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; }
        .caption { color: #ba1636; position: absolute; bottom: 15px; left: 0; width: 100%; font-family: 'Dancing Script', cursive; font-size: 1.6rem; }

        .keypad-side { margin-top: 40px; display: flex; flex-direction: column; align-items: center; }
        .passcode-title { font-size: 1rem; margin-bottom: 15px; color: #ffccd5; letter-spacing: 2px; text-transform: uppercase; }
        .dots-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .dot { width: 20px; height: 20px; border: 2px solid #ff99aa; border-radius: 50%; }
        .dot.active { background-color: #ff99aa; transform: scale(1.1); }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .key, .enter-btn { cursor: pointer; background: #ff99aa; color: #ba1636; border: none; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.5rem; transition: transform 0.1s; }
        .key { width: 55px; height: 55px; border-radius: 50%; }
        .key:active { transform: scale(0.9); }
        .enter-btn { padding: 12px 40px; border-radius: 30px; font-size: 1.2rem; text-transform: uppercase; }

        #interaction-prompt {
            position: absolute; bottom: 15vh; width: 100%; text-align: center;
            font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #ff99aa;
            z-index: 50; opacity: 0; pointer-events: none; text-shadow: 0 0 20px rgba(255,153,170,0.5);
        }

        #spotify-layer {
            position: absolute; top: 10vh; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; z-index: 50; opacity: 0; transition: opacity 2s ease;
            pointer-events: none; /* Disabled until active */
        }
    </style>
</head>
<body>

    <div id="lock-stage">
        <div class="polaroid">
            <img src="sweetu.jpg" alt="My Sweetu">
            <div class="caption">Congratulations for one year of our love</div>
        </div>
        <div class="keypad-side">
            <h2 class="passcode-title">ENTER YOUR PASSCODE</h2>
            <div class="dots-container" id="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="keypad-grid">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key" onclick="clearCode()">*</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <button class="key" onclick="clearCode()">#</button>
            </div>
            <button class="enter-btn" onclick="checkPasscode()">Enter</button>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="interaction-prompt">Touch the universe...</div>

    <div id="spotify-layer">
        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(255,153,170,0.3);">
            <p style="color: #ff99aa; margin-bottom: 10px;">🎵 Echoes of eternity</p>
            <div style="height: 80px; border: 1px dashed #ff99aa; border-radius: 8px; display:flex; align-items:center; justify-content:center; color:#fff;">[Spotify Iframe goes here]</div>
        </div>
    </div>

    <script>
        // --- 1. LOCK SCREEN LOGIC ---
        const CORRECT_PASSCODE = "2308"; 
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');

        function pressKey(num) { if (currentInput.length < 4) { currentInput += num; updateDots(); } }
        function clearCode() { currentInput = ""; updateDots(); }
        function updateDots() { dots.forEach((dot, index) => { if (index < currentInput.length) dot.classList.add('active'); else dot.classList.remove('active'); }); }

        function checkPasscode() {
            if (currentInput === CORRECT_PASSCODE) {
                document.getElementById('lock-stage').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('lock-stage').style.visibility = "hidden";
                    init3DUniverse(); // Boot up the GPU engine
                }, 1000);
            } else { 
                clearCode(); 
            }
        }

        // --- 2. THREE.JS 3D ENGINE ---
        let scene, camera, renderer, particles, particleGeometry;
        const PARTICLE_COUNT = 8000; // Massive density, zero lag on GPU
        
        let spherePositions = new Float32Array(PARTICLE_COUNT * 3);
        let heartPositions = new Float32Array(PARTICLE_COUNT * 3);
        
        let isHeartShape = false;
        let mouseX = 0; let mouseY = 0;

        function init3DUniverse() {
            const container = document.getElementById('canvas-container');
            container.style.opacity = "1";

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 45;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Generate Math for Shapes
            for(let i = 0; i < PARTICLE_COUNT; i++) {
                // Shape 1: The Galaxy (Sphere)
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 15 + Math.random() * 8; // Galaxy radius
                
                spherePositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                spherePositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                spherePositions[i*3+2] = r * Math.cos(phi);

                // Shape 2: The 3D Heart (Parametric Math)
                const t = Math.random() * Math.PI * 2;
                const hr = 0.8 + Math.random() * 0.4; // Thickness spread
                
                const hx = hr * 16 * Math.pow(Math.sin(t), 3);
                const hy = hr * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const hz = (Math.random() - 0.5) * 6; // 3D depth of the heart
                
                heartPositions[i*3] = hx * 0.8;
                heartPositions[i*3+1] = hy * 0.8;
                heartPositions[i*3+2] = hz;
            }

            particleGeometry = new THREE.BufferGeometry();
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(spherePositions, 3));

            // Premium Glowing Material
            const material = new THREE.PointsMaterial({
                size: 0.18,
                color: 0xff4d88, // Deep glowing pink
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(particleGeometry, material);
            scene.add(particles);

            // Fade in the prompt
            setTimeout(() => {
                gsap.to("#interaction-prompt", { opacity: 1, duration: 2, yoyo: true, repeat: -1 });
            }, 2000);

            // Interaction Listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('touchmove', onTouchMove, {passive: true});
            document.addEventListener('mousemove', onMouseMove);
            
            // The magic morph trigger
            container.addEventListener('click', morphToHeart);
            container.addEventListener('touchstart', morphToHeart);

            animate();
        }

        function morphToHeart() {
            if(isHeartShape) return;
            isHeartShape = true;
            
            gsap.killTweensOf("#interaction-prompt");
            gsap.to("#interaction-prompt", { opacity: 0, duration: 0.5 });

            // Reveal the UI
            const spotifyLayer = document.getElementById('spotify-layer');
            spotifyLayer.style.opacity = "1";
            spotifyLayer.style.pointerEvents = "auto";

            // Morphing Physics via GSAP
            const currentPositions = particleGeometry.attributes.position.array;
            
            for(let i = 0; i < PARTICLE_COUNT; i++) {
                gsap.to(currentPositions, {
                    [i*3]: heartPositions[i*3],
                    [i*3+1]: heartPositions[i*3+1],
                    [i*3+2]: heartPositions[i*3+2],
                    duration: 2.5 + Math.random() * 1.5, // Organic swirling delay
                    ease: "power3.inOut",
                    onUpdate: () => { particleGeometry.attributes.position.needsUpdate = true; }
                });
            }
        }

        // Swipe & Mouse tracking for 3D rotation
        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) * 0.001;
            mouseY = (event.clientY - window.innerHeight / 2) * 0.001;
        }
        function onTouchMove(event) {
            mouseX = (event.touches[0].clientX - window.innerWidth / 2) * 0.001;
            mouseY = (event.touches[0].clientY - window.innerHeight / 2) * 0.001;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // The Engine Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Constant subtle rotation
            particles.rotation.y += 0.002;
            
            // Interactive Parallax
            particles.rotation.x += (mouseY - particles.rotation.x) * 0.05;
            particles.rotation.y += (mouseX - particles.rotation.y) * 0.05;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
