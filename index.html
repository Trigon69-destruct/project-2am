<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* Base Reset & Deep Red Background */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #b31b34; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; margin: 0; }

        /* Full Screen Lock Overlay */
        #lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #b31b34; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        /* Side-by-Side Container (Wraps on mobile) */
        .lock-container {
            display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 70px;
            width: 100%; max-width: 800px; padding: 20px;
        }

        @media (max-width: 768px) {
            .lock-container { flex-direction: column; gap: 40px; }
        }

        /* --- Left Side: Polaroid Aesthetic --- */
        .polaroid {
            background: white; padding: 15px 15px 50px 15px;
            border-radius: 4px; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            position: relative; text-align: center; width: 220px;
        }
        
        .polaroid img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: #eee;
        }
        
        .polaroid .caption {
            color: #b31b34; font-family: 'Brush Script MT', 'Pacifico', cursive; font-size: 1.6rem;
            position: absolute; bottom: 12px; left: 0; width: 100%;
        }
        
        /* The Pink Bow */
        .bow {
            position: absolute; top: -25px; left: -25px; font-size: 4rem; transform: rotate(-15deg);
        }

        /* --- Right Side: Keypad Aesthetic --- */
        .keypad-side { display: flex; flex-direction: column; align-items: center; }
        
        .passcode-title {
            font-size: 1rem; margin-bottom: 20px; color: #ffccd5; letter-spacing: 2px; font-weight: normal;
        }
        
        /* Square Passcode Dots */
        .dots-container { display: flex; gap: 12px; margin-bottom: 30px; }
        
        .dot {
            width: 20px; height: 20px; border: 2px solid #ff99aa; border-radius: 4px; transition: all 0.2s ease;
        }
        
        .dot.active { background-color: #ff99aa; }
        
        /* The Pink Circular Buttons */
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        
        .key {
            width: 50px; height: 50px; border-radius: 50%; background: #ff99aa; border: none;
            color: #b31b34; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: transform 0.1s;
        }
        
        .key:active { transform: scale(0.9); }
        
        /* The Pill-Shaped Enter Button */
        .enter-btn {
            background: #ff99aa; color: #b31b34; border: none; padding: 10px 40px;
            border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s;
        }
        
        .enter-btn:active { transform: scale(0.95); }

        /* Main Content (Hidden until unlocked) */
        #main-content { display: none; background-color: #fdf6e3; width: 100%; height: 100%; justify-content: center; align-items: center; flex-direction: column; color: #333; }
    </style>
</head>
<body>

    <!-- PASSCODE LOCK SCREEN -->
    <div id="lock-screen">
        <div class="lock-container">
            
            <!-- Polaroid Image Side -->
            <div class="polaroid">
                <div class="bow">🎀</div>
                <!-- Change 'sweetu.jpg' to the actual name of her photo once you upload it -->
                <img src="sweetu.jpg" alt="My Sweetu" id="lock-photo" onerror="this.src='https://via.placeholder.com/200/cccccc/ffffff?text=Upload+Photo'">
                <div class="caption">For You!</div>
            </div>

            <!-- Keypad Side -->
            <div class="keypad-side">
                <h2 class="passcode-title">Enter a Passcode</h2>
                
                <div class="dots-container">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

                <div class="keypad-grid">
                    <button class="key" onclick="pressKey('1')">1</button>
                    <button class="key" onclick="pressKey('2')">2</button>
                    <button class="key" onclick="pressKey('3')">3</button>
                    <button class="key" onclick="pressKey('4')">4</button>
                    <button class="key" onclick="pressKey('5')">5</button>
                    <button class="key" onclick="pressKey('6')">6</button>
                    <button class="key" onclick="pressKey('7')">7</button>
                    <button class="key" onclick="pressKey('8')">8</button>
                    <button class="key" onclick="pressKey('9')">9</button>
                    <button class="key" onclick="clearCode()">*</button>
                    <button class="key" onclick="pressKey('0')">0</button>
                    <button class="key" onclick="clearCode()">#</button>
                </div>
                
                <button class="enter-btn" onclick="checkPasscode()">Enter</button>
            </div>
        </div>
    </div>

    <!-- MAIN ENVELOPE CONTENT -->
    <div id="main-content">
        <audio id="bg-music" src="run-through-fire.mp3" loop></audio>
        <h2>Envelope Interface Loading...</h2>
    </div>

    <!-- LOGIC SCRIPT -->
    <script>
        const CORRECT_PASSCODE = "1507"; 
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const bgMusic = document.getElementById('bg-music');

        function pressKey(num) {
            if (currentInput.length < 4) {
                currentInput += num;
                updateDots();
            }
        }

        function clearCode() {
            currentInput = "";
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentInput.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function checkPasscode() {
            if (currentInput === CORRECT_PASSCODE) {
                bgMusic.play().catch(e => console.log("Waiting for audio file."));
                const lockScreen = document.getElementById('lock-screen');
                lockScreen.style.opacity = "0";
                setTimeout(() => {
                    lockScreen.style.display = "none";
                    document.getElementById('main-content').style.display = "flex";
                }, 800);
            } else {
                alert("Wrong passcode, try again sweetu! ❤️");
                clearCode();
            }
        }
    </script>
</body>
</html>
