<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <!-- Importing Premium Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap');
        
        /* Base Reset & Deep Red Background */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #ba1636; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Quicksand', sans-serif;
        }

        /* Full Screen Lock Overlay */
        #lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ba1636; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        /* Container Layout */
        .lock-container {
            display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 70px;
            width: 100%; max-width: 800px; padding: 20px;
        }

        /* --- THE BULLETPROOF MOBILE LAYOUT SHRINK --- */
        @media (max-width: 768px) {
            .lock-container { flex-direction: column; gap: 20px; }
            .polaroid { 
                width: 210px !important; 
                padding: 12px 12px 75px 12px !important; /* Kept wide enough at the bottom for the new text */
                margin-top: 30px; 
                margin-left: 10px; 
            }
            .bow { 
                left: -12px !important; 
                top: -18px !important; 
                font-size: 3rem !important; 
            }
            .keypad-grid { gap: 12px !important; margin-bottom: 20px !important; }
            .key { width: 50px !important; height: 50px !important; font-size: 1.3rem !important; } 
            .dots-container { margin-bottom: 25px !important; }
            .passcode-title { margin-bottom: 15px !important; }
        }

        /* --- Left Side: Premium Polaroid Aesthetic --- */
        .polaroid {
            background: white; padding: 15px 15px 85px 15px; 
            border-radius: 6px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative; text-align: center; width: 240px;
            transform: rotate(-2deg);
            transition: transform 0.3s ease;
        }
        
        .polaroid:hover { transform: rotate(0deg) scale(1.02); }
        
        .polaroid img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover; 
            background-color: #eee; border-radius: 4px;
        }
        
        /* Premium Text Layout */
        .polaroid .caption {
            color: #ba1636; 
            position: absolute; bottom: 15px; left: 0; width: 100%;
            line-height: 1.2;
            padding: 0 10px; /* Keeps text from touching the absolute edges */
        }
        
        .caption .title {
            font-family: 'Dancing Script', cursive; 
            font-size: 1.6rem; /* Scaled perfectly to fit the space in a beautiful wrapped layout */
            display: block;
        }
        
        /* Floating 3D Bow */
        .bow {
            position: absolute; top: -25px; left: -25px; font-size: 4rem; 
            transform: rotate(-15deg);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: rotate(-15deg) translateY(0); }
            50% { transform: rotate(-15deg) translateY(-8px); }
        }

        /* --- Right Side: Keypad Aesthetic --- */
        .keypad-side { display: flex; flex-direction: column; align-items: center; }
        
        .passcode-title {
            font-size: 1.1rem; margin-bottom: 20px; color: #ffccd5; 
            letter-spacing: 2px; font-weight: 700; text-transform: uppercase;
        }
        
        /* Square Passcode Dots with Smooth Morph */
        .dots-container { display: flex; gap: 15px; margin-bottom: 35px; }
        
        .dot {
            width: 22px; height: 22px; border: 2.5px solid #ff99aa; 
            border-radius: 6px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .dot.active { 
            background-color: #ff99aa; 
            transform: scale(1.15); 
            border-radius: 50%; 
        }
        
        /* Shake Error Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        .shake .dot { border-color: white; background-color: transparent; }

        /* Tactile Pink Circular Buttons */
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 30px; }
        
        .key {
            width: 55px; height: 55px; border-radius: 50%; background: #ff99aa; border: none;
            color: #ba1636; font-size: 1.5rem; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.15s ease;
            font-family: 'Quicksand', sans-serif;
        }
        
        .key:active { transform: scale(0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* The Pill-Shaped Enter Button */
        .enter-btn {
            background: #ff99aa; color: #ba1636; border: none; padding: 12px 45px;
            border-radius: 30px; font-size: 1.2rem; font-weight: 700; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.15s ease;
            font-family: 'Quicksand', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .enter-btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* Main Content (Hidden until unlocked) */
        #main-content { display: none; background-color: #fdf6e3; width: 100%; height: 100%; justify-content: center; align-items: center; flex-direction: column; color: #333; }
    </style>
</head>
<body>

    <!-- PASSCODE LOCK SCREEN -->
    <div id="lock-screen">
        <div class="lock-container">
            
            <!-- Polaroid Image Side -->
            <div class="polaroid">
                <div class="bow">🎀</div>
                <!-- Image source waiting for your upload -->
                <img src="sweetu.jpg" alt="My Sweetu" id="lock-photo" onerror="this.src='https://via.placeholder.com/200/cccccc/ffffff?text=Upload+Photo'">
                <div class="caption">
                    <span class="title">Congratulations for one year of our love</span>
                </div>
            </div>

            <!-- Keypad Side -->
            <div class="keypad-side">
                <h2 class="passcode-title">Enter a Passcode</h2>
                
                <div class="dots-container" id="dots-container">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

                <div class="keypad-grid">
                    <button class="key" onclick="pressKey('1')">1</button>
                    <button class="key" onclick="pressKey('2')">2</button>
                    <button class="key" onclick="pressKey('3')">3</button>
                    <button class="key" onclick="pressKey('4')">4</button>
                    <button class="key" onclick="pressKey('5')">5</button>
                    <button class="key" onclick="pressKey('6')">6</button>
                    <button class="key" onclick="pressKey('7')">7</button>
                    <button class="key" onclick="pressKey('8')">8</button>
                    <button class="key" onclick="pressKey('9')">9</button>
                    <button class="key" onclick="clearCode()">*</button>
                    <button class="key" onclick="pressKey('0')">0</button>
                    <button class="key" onclick="clearCode()">#</button>
                </div>
                
                <button class="enter-btn" onclick="checkPasscode()">Enter</button>
            </div>
        </div>
    </div>

    <!-- MAIN ENVELOPE CONTENT -->
    <div id="main-content">
        <audio id="bg-music" src="run-through-fire.mp3" loop></audio>
        <h2>Envelope Interface Loading...</h2>
    </div>

    <!-- LOGIC SCRIPT -->
    <script>
        const CORRECT_PASSCODE = "2308"; 
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const dotsContainer = document.getElementById('dots-container');
        const bgMusic = document.getElementById('bg-music');

        function pressKey(num) {
            if (currentInput.length < 4) {
                currentInput += num;
                updateDots();
            }
        }

        function clearCode() {
            currentInput = "";
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentInput.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function checkPasscode() {
            if (currentInput === CORRECT_PASSCODE) {
                // Success: Play music and fade out
                bgMusic.play().catch(e => console.log("Waiting for audio file."));
                const lockScreen = document.getElementById('lock-screen');
                lockScreen.style.opacity = "0";
                setTimeout(() => {
                    lockScreen.style.display = "none";
                    document.getElementById('main-content').style.display = "flex";
                }, 800);
            } else {
                // Error: Trigger shake animation and clear
                dotsContainer.classList.add('shake');
                setTimeout(() => {
                    dotsContainer.classList.remove('shake');
                    clearCode();
                }, 500);
            }
        }
    </script>
</body>
</html>
